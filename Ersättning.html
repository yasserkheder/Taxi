<body x-data="app()" x-init="init()" class="min-h-screen">

    <!-- Mobile Header -->
    <header class="px-5 pt-12 pb-4 flex justify-between items-end">
        <div class="flex items-center gap-3 text-left">
            <div class="bg-blue-500 p-2.5 rounded-xl shadow-lg shadow-blue-500/20 text-white">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight leading-none">Ersättning</h1>
                <p class="text-[10px] font-bold text-gray-400 tracking-wider uppercase mt-1">Familjen Kheder</p>
                <!-- عرض معلومات اليوم والأسبوع الحالي -->
                <p class="text-[8px] text-gray-400 mt-0.5" x-text="getTodayInfo().formatted"></p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button type="button" @click.stop.prevent="openWeekModal()" @touchstart.stop
                    class="bg-blue-50 text-blue-600 p-3 rounded-full border border-blue-100 shadow-sm active:scale-90 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            </button>
            <div class="bg-white/80 backdrop-blur px-5 py-3 rounded-full border border-black/10 shadow-md flex items-center gap-3">
                <span class="text-sm font-black text-gray-500">V.</span>
                <select x-model="selectedWeek" class="bg-transparent font-black text-blue-600 outline-none text-xl">
                    <template x-for="w in getAvailableWeeks().slice().reverse()" :key="w">
                        <option :value="w" x-text="w"></option>
                    </template>
                </select>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 pb-32">
        
        <!-- DASHBOARD with Top Tabs -->
        <div x-show="view === 'dashboard'" class="space-y-5">
            <!-- Top Tabs: Ersättning | Vecka -->
            <div class="flex gap-2 p-1 ios-card">
                <button @click="dashboardSubView = 'overview'" 
                        class="top-tab" 
                        :class="dashboardSubView === 'overview' ? 'active' : ''">
                    Ersättning
                </button>
                <button @click="dashboardSubView = 'week'" 
                        class="top-tab" 
                        :class="dashboardSubView === 'week' ? 'active' : ''">
                    Vecka
                </button>
            </div>

            <!-- الصفحة القديمة: Ersättning -->
            <div x-show="dashboardSubView === 'overview'" class="space-y-5">
                <div class="grid grid-cols-2 gap-3">
                    <div class="ios-card p-4 flex flex-col justify-between min-h-[100px] text-left">
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider leading-none">Mål</span>
                        <div class="mt-2">
                            <div class="text-xl font-bold" x-text="formatCurrency(getWeeklyData().centralPris * calculateUniqueDays(selectedWeek))"></div>
                            <div class="text-[10px] text-gray-400 mt-0.5"><span x-text="calculateUniqueDays(selectedWeek)"></span> dagar à <span x-text="getWeeklyData().centralPris"></span></div>
                        </div>
                    </div>
                    <div class="ios-card p-4 flex flex-col justify-between min-h-[100px] text-left">
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider leading-none">Utbetalt</span>
                        <div class="mt-2">
                            <div class="text-xl font-bold text-emerald-600" x-text="formatCurrency(getWeeklyData().summan)"></div>
                            <div class="text-[10px] text-gray-400 mt-0.5 tracking-tight">Summan</div>
                        </div>
                    </div>
                    <div class="ios-card p-4 flex flex-col justify-between min-h-[100px] text-left">
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider leading-none">Godkänd</span>
                        <div class="mt-2">
                            <div class="text-xl font-bold text-purple-600" x-text="formatCurrency(calculateApprovedTotal())"></div>
                            <div class="text-[10px] text-gray-400 mt-0.5 tracking-tight">Max <span x-text="getWeeklyData().centralPris"></span>/dag</div>
                        </div>
                    </div>
                    <div class="ios-card p-4 flex flex-col justify-between min-h-[100px] text-left">
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider leading-none">Ersättning</span>
                        <div class="mt-2">
                            <div class="text-xl font-bold text-orange-500" x-text="formatCurrency(calculateCompensation())"></div>
                            <div class="text-[10px] text-gray-400 mt-0.5 tracking-tight">Mål - Godkänd</div>
                        </div>
                    </div>
                </div>

                <!-- Result Card -->
                <div class="ios-card overflow-hidden bg-slate-900 shadow-xl shadow-blue-900/10 text-left">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Slutresultat</p>
                                <h2 class="text-4xl font-black tracking-tighter" 
                                    :class="calculateResult() <= 0 ? 'text-emerald-400' : 'text-rose-400'"
                                    x-text="formatCurrency(calculateResult())"></h2>
                            </div>
                            <div :class="calculateResult() <= 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'" 
                                 class="p-2.5 rounded-full backdrop-blur-md border border-white/5">
                                <template x-if="calculateResult() <= 0">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                </template>
                                <template x-if="calculateResult() > 0">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                                </template>
                            </div>
                        </div>
                        <div class="mt-6 space-y-2 border-t border-white/5 pt-4">
                            <div class="flex justify-between text-[11px] text-slate-400">
                                <span>Ersättning</span>
                                <span class="font-mono text-white" x-text="formatCurrency(calculateCompensation())"></span>
                            </div>
                            <div class="flex justify-between text-[11px] text-slate-400">
                                <span>- Utbetalt (Summan)</span>
                                <span class="font-mono text-white" x-text="formatCurrency(getWeeklyData().summan)"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صفحة Vecka - أيام العمل الفعلية (النشطة فقط) -->
            <div x-show="dashboardSubView === 'week'" class="space-y-4">

            </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="input-group">

                    </div>

                    <div class="input-group"><div class="label">Start</div><input type="time" x-model="newOrder.starttid" required></div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('app', () => ({
                view: 'dashboard',
                dashboardSubView: 'overview',
                selectedWeek: 1,
                showAddForm: false,
                isEditing: false,
                editingId: null,
                orders: [],
                availableWeeks: [],
                weeklySettings: {},
                showDetails: false,
                confirmModal: { show: false, title: '', message: '', action: null },
                weekModal: { show: false, value: '' },
                newOrder: { datum: '', zoneNu: '', korpass: '', starttid: '08:00', sluttid: '16:00', pris: 0, aktiv: true },

                init() {
                    this.loadFromStorage();
                    window.addEventListener('beforeunload', () => {
                        this.saveAllToStorage();
                    });
                },

                // دالة معلومات اليوم الحالي
                getTodayInfo() {
                    const today = new Date();
                    const year = today.getFullYear();
                    const month = String(today.getMonth() + 1).padStart(2, '0');
                    const day = String(today.getDate()).padStart(2, '0');
                    const todayDate = `${year}-${month}-${day}`;
                    
                    // أسماء الأيام بالسويدية
                    const weekdays = ['Söndag', 'Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag'];
                    const dayName = weekdays[today.getDay()];
                    
                    // حساب رقم الأسبوع
                    const weekNumber = this.getWeekNum();
                    
                    return {
                        date: todayDate,
                        dayName: dayName,
                        week: weekNumber,
                        formatted: `${dayName} ${todayDate} - Vecka ${weekNumber}`
                    };
                },

                // دالة محسنة لحساب رقم الأسبوع بناءً على تاريخ اليوم
                getWeekNum() {
                    const today = new Date();
                    const firstJan = new Date(today.getFullYear(), 0, 1);
                    const days = Math.floor((today - firstJan) / (24 * 60 * 60 * 1000));
                    return Math.ceil((days + firstJan.getDay() + 1) / 7);
                },

                // الأيام النشطة (التي لها طلبات نشطة) في الأسبوع الحالي
                getActiveDays() {
                    const days = new Set();
                    this.orders
                        .filter(o => o.veckoNu == this.selectedWeek && o.aktiv === true)
                        .forEach(o => days.add(o.datum));
                    
                    // ترتيب تصاعدي
                    return Array.from(days).sort((a, b) => new Date(a) - new Date(b));
                },

                // الحصول على رحلات نشطة ليوم معين
                getDayOrders(date) {
                    return this.orders.filter(o => o.datum === date && o.veckoNu == this.selectedWeek && o.aktiv === true);
                },

                // عدد الرحلات النشطة في يوم معين
                getDayOrdersCount(date) {
                    return this.getDayOrders(date).length;
                },

                // إجمالي الدخل ليوم معين (مجموع أسعار الرحلات النشطة فقط)
                getDayTotal(date) {
                    return this.getDayOrders(date)
                        .reduce((sum, o) => sum + (parseFloat(o.pris) || 0), 0);
                },

                saveAllToStorage() {
                    localStorage.setItem('orders', JSON.stringify(this.orders));
                    localStorage.setItem('weeklySettings', JSON.stringify(this.weeklySettings));
                    localStorage.setItem('availableWeeks', JSON.stringify(this.availableWeeks));
                },

                loadFromStorage() {
                    try {
                        const savedWeeks = localStorage.getItem('availableWeeks');
                        if (savedWeeks) {
                            this.availableWeeks = JSON.parse(savedWeeks);
                        }
                        
                        const savedOrders = localStorage.getItem('orders');
                        if (savedOrders) {
                            this.orders = JSON.parse(savedOrders);
                        }
                        
                        const savedWeekly = localStorage.getItem('weeklySettings');
                        if (savedWeekly) {
                            this.weeklySettings = JSON.parse(savedWeekly);
                        }
                        
                        if (!this.availableWeeks || this.availableWeeks.length === 0) {
                            this.selectedWeek = this.getWeekNum();
                            this.availableWeeks = [this.selectedWeek];
                        } else {
                            this.selectedWeek = Math.max(...this.availableWeeks);
                        }
                        
                        if (!this.weeklySettings[this.selectedWeek]) {
                            this.weeklySettings[this.selectedWeek] = { centralPris: 0, summan: 0 };
                        }
                        
                        this.saveAllToStorage();
                        
                    } catch (e) {
                        console.error("Error loading data:", e);
                        this.orders = [];
                        this.weeklySettings = {};
                        this.availableWeeks = [this.getWeekNum()];
                        this.selectedWeek = this.availableWeeks[0];
                        this.saveAllToStorage();
                    }
                },

                getAvailableWeeks() {
                    return [...new Set(this.availableWeeks)].sort((a, b) => a - b);
                },

                openWeekModal() {
                    this.weekModal.value = this.selectedWeek;
                    this.weekModal.show = true;
                },

                submitWeekModal() {
                    let w = parseInt(this.weekModal.value);
                    if(!isNaN(w) && w >= 1 && w <= 52) {
                        if(!this.availableWeeks.includes(w)) {
                            this.availableWeeks.push(w);
                            this.availableWeeks.sort((a, b) => a - b);
                            this.saveAllToStorage();
                        }
                        this.selectedWeek = w;
                        this.weekModal.show = false;
                    }
                },

                addNextWeek() {
                    let next;
                    if (this.availableWeeks.length > 0) {
                        const max = Math.max(...this.availableWeeks);
                        next = max < 52 ? max + 1 : 1;
                    } else {
                        next = this.getWeekNum();
                    }
                    
                    if (!this.availableWeeks.includes(next)) {
                        this.availableWeeks.push(next);
                        this.availableWeeks.sort((a, b) => a - b);
                        this.saveAllToStorage();
                    }
                    this.selectedWeek = next;
                },

                getWeeklyData() {
                    if (!this.weeklySettings[this.selectedWeek]) {
                        this.weeklySettings[this.selectedWeek] = { centralPris: 0, summan: 0 };
                    }
                    return this.weeklySettings[this.selectedWeek];
                },

                saveWeeklyData() { 
                    this.saveAllToStorage(); 
                },

                // تعديل دالة openModal - إزالة قيود التاريخ نهائياً
                openModal() {
                    this.isEditing = false; 
                    this.showAddForm = true;
                    // تاريخ اليوم كاقتراح فقط، بدون أي قيود
                    this.newOrder = { 
                        datum: new Date().toISOString().split('T')[0], 
                        zoneNu: '', 
                        korpass: '', 
                        starttid: '08:00', 
                        sluttid: '16:00', 
                        pris: 0,
                        aktiv: true 
                    };
                },

                editOrder(order) { 
                    this.isEditing = true; 
                    this.editingId = order.id; 
                    this.newOrder = JSON.parse(JSON.stringify(order)); 
                    this.showAddForm = true; 
                },

                addOrder() {
                    if (this.newOrder.pris === '' || this.newOrder.pris === null) {
                        this.newOrder.pris = 0;
                    }
                    
                    if (this.isEditing) {
                        const index = this.orders.findIndex(o => o.id === this.editingId);
                        if (index !== -1) {
                            this.orders[index] = { ...this.newOrder, id: this.editingId, veckoNu: this.selectedWeek };
                        }
                    } else {
                        this.orders.push({ 
                            ...this.newOrder, 
                            id: Date.now(), 
                            veckoNu: this.selectedWeek 
                        });
                    }
                    this.saveAllToStorage(); 
                    this.showAddForm = false;
                },

                deleteWeek(w) {
                    this.confirmModal = {
                        show: true,
                        title: 'Radera vecka',
                        message: `Är du säker på att du vill radera hela vecka ${w}? Detta kommer även att ta bort alla körpass för denna vecka.`,
                        action: () => {
                            this.orders = this.orders.filter(o => o.veckoNu != w);
                            delete this.weeklySettings[w];
                            this.availableWeeks = this.availableWeeks.filter(week => week != w);
                            if (this.selectedWeek == w) {
                                this.selectedWeek = this.availableWeeks.length > 0 ? 
                                    Math.max(...this.availableWeeks) : this.getWeekNum();
                            }
                            this.saveAllToStorage();
                            this.confirmModal.show = false;
                        }
                    };
                },

                toggleOrder(id) {
                    const index = this.orders.findIndex(o => o.id === id);
                    if (index !== -1) {
                        this.orders[index].aktiv = !this.orders[index].aktiv;
                        this.saveAllToStorage();
                    }
                },

                deleteOrder(id) {
                    this.confirmModal = {
                        show: true,
                        title: 'Radera körpass',
                        message: 'Är du säker på att du vill radera detta körpass?',
                        action: () => {
                            this.orders = this.orders.filter(o => o.id !== id);
                            this.saveAllToStorage();
                            this.confirmModal.show = false;
                        }
                    };
                },

                filteredOrders() { 
                    return this.orders
                        .filter(o => o.veckoNu == this.selectedWeek)
                        .sort((a, b) => new Date(b.datum) - new Date(a.datum)); 
                },

                calculateOrderDuration(order) {
                    const [h1, m1] = order.starttid.split(':').map(Number);
                    const [h2, m2] = order.sluttid.split(':').map(Number);
                    let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                    return diff < 0 ? diff + 1440 : diff;
                },

                calculateUniqueDays(w) {
                    const days = new Set(
                        this.orders
                            .filter(o => o.veckoNu == w && o.aktiv)
                            .map(o => o.datum)
                    );
                    return days.size || 0;
                },

                calculateApprovedTotal() { 
                    return this.calculateWeeklyApprovedTotal(this.selectedWeek); 
                },
                
                calculateWeeklyApprovedTotal(w) {
                    const settings = this.weeklySettings[w] || { centralPris: 0, summan: 0 };
                    const cp = settings.centralPris;
                    const days = {};
                    this.orders
                        .filter(o => o.veckoNu == w && o.aktiv)
                        .forEach(o => { 
                            days[o.datum] = (days[o.datum] || 0) + (parseFloat(o.pris) || 0); 
                        });
                    return Object.values(days).reduce((t, s) => t + Math.min(s, cp), 0);
                },

                calculateCompensation() { 
                    return this.calculateWeeklyCompensation(this.selectedWeek); 
                },
                
                calculateWeeklyCompensation(w) {
                    const settings = this.weeklySettings[w] || { centralPris: 0, summan: 0 };
                    const uniqueDays = this.calculateUniqueDays(w);
                    return (settings.centralPris * uniqueDays) - this.calculateWeeklyApprovedTotal(w);
                },

                calculateResult() { 
                    return this.calculateWeeklyResult(this.selectedWeek); 
                },
                
                calculateWeeklyResult(w) {
                    const settings = this.weeklySettings[w] || { centralPris: 0, summan: 0 };
                    return this.calculateWeeklyCompensation(w) - settings.summan;
                },
                
                formatCurrency(val) { 
                    return new Intl.NumberFormat('sv-SE').format(val || 0) + ' kr'; 
                },

                // دالة المشاركة
                shareWeekData() {
                    const weeklyData = this.getWeeklyData();
                    const uniqueDays = this.calculateUniqueDays(this.selectedWeek);
                    const approvedTotal = this.calculateWeeklyApprovedTotal(this.selectedWeek);
                    const compensation = this.calculateWeeklyCompensation(this.selectedWeek);
                    const result = this.calculateWeeklyResult(this.selectedWeek);
                    
                    // تكوين النص
                    const textToShare = 
`📊 Ersättning - Vecka ${this.selectedWeek}
📅 ${uniqueDays} arbetsdagar

💰 Mål: ${this.formatCurrency(weeklyData.centralPris * uniqueDays)}
✅ Godkända ordrar: ${this.formatCurrency(approvedTotal)}
💵 Ersättning: ${this.formatCurrency(compensation)}
🏦 Utbetalt: ${this.formatCurrency(weeklyData.summan || 0)}
📈 Resultat: ${this.formatCurrency(result)}

📱 Från appen Ersättning`;
                    
                    // استخدام Web Share API إذا كان متاحاً
                    if (navigator.share) {
                        navigator.share({
                            title: 'Ersättning',
                            text: textToShare,
                        })
                        .then(() => console.log('Delat!'))
                        .catch((error) => {
                            console.log('Kunde inte dela:', error);
                            this.copyToClipboard(textToShare);
                        });
                    } else {
                        this.copyToClipboard(textToShare);
                    }
                },
                
                copyToClipboard(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('Informationen kopierad till urklipp!');
                }
            }));
        });
    </script>

    <!-- WEEK SELECTION MODAL -->
    <div x-show="weekModal.show" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="weekModal.show = false" @touchstart.stop></div>
        <div class="relative bg-white rounded-[28px] p-8 w-full max-w-sm shadow-2xl text-center border border-gray-100">
            <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-3 text-gray-900">Välj vecka</h3>
            <p class="text-gray-500 text-base font-medium mb-6 leading-relaxed">Ange veckonummer (1-52)</p>
            
            <div class="input-group mb-8">
                <input type="number" x-model="weekModal.value" min="1" max="52" 
                       class="w-full text-center text-3xl font-black text-blue-600 bg-gray-50 border-none rounded-2xl py-4 focus:ring-0"
                       @keyup.enter="submitWeekModal()">
            </div>

            <div class="flex flex-col gap-3">
                <button type="button" @click="submitWeekModal()" @touchstart.stop class="w-full py-5 bg-blue-500 text-white text-lg font-black rounded-2xl active:scale-[0.97] transition-all shadow-lg shadow-blue-500/30">Välj vecka</button>
                <button type="button" @click="weekModal.show = false" @touchstart.stop class="w-full py-5 bg-gray-100 text-gray-700 text-lg font-bold rounded-2xl active:scale-[0.97] transition-all">Avbryt</button>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION MODAL -->
    <div x-show="confirmModal.show" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="confirmModal.show = false" @touchstart.stop></div>
        <div class="relative bg-white rounded-[28px] p-8 w-full max-w-sm shadow-2xl text-center border border-gray-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-3 text-gray-900" x-text="confirmModal.title"></h3>
            <p class="text-gray-500 text-base font-medium mb-10 leading-relaxed px-2" x-text="confirmModal.message"></p>
            <div class="flex flex-col gap-3">
                <button type="button" @click="confirmModal.action()" @touchstart.stop class="w-full py-5 bg-rose-500 text-white text-lg font-black rounded-2xl active:scale-[0.97] transition-all shadow-lg shadow-rose-500/30">Ja, Radera</button>
                <button type="button" @click="confirmModal.show = false" @touchstart.stop class="w-full py-5 bg-gray-100 text-gray-700 text-lg font-bold rounded-2xl active:scale-[0.97] transition-all">Avbryt</button>
            </div>
        </div>
    </div>
</body>
</html>
